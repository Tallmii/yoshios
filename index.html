<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win10 Game Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="desktop">
        <div class="icon" onclick="toggleWindow('minesweeper')">
            <img src="https://img.icons8.com/color/48/000000/minesweeper.png" alt="Minesweeper">
            <span>Minesweeper</span>
        </div>

        <div id="window-minesweeper" class="window">
            <div class="window-header" id="header-minesweeper">
                <div class="header-title">
                    <img src="https://img.icons8.com/color/16/000000/minesweeper.png">
                    <span>Minesweeper</span>
                </div>
                <div class="header-controls">
                    <button class="win-btn">0</button>
                    <button class="win-btn" onclick="toggleWindow('minesweeper')">X</button>
                </div>
            </div>
            <div class="window-content">
                <iframe src="https://tclaws.jacwilkowski.workers.dev/" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <div id="start-menu" class="hidden">
        <div class="start-sidebar">
            <div class="side-icon">☰</div>
            <div class="side-icon-bottom">⚙️</div>
        </div>
        <div class="start-tiles">
            <p>Life at a glance</p>
            <div class="tile-container">
                <div class="tile-inner">
                    <div class="tile-front">Solitaire</div>
                    <div class="tile-back">Daily Challenge</div>
                </div>
            </div>
        </div>
    </div>

    <div id="taskbar">
        <button id="start-btn">
            <img src="https://img.icons8.com/color/24/000000/windows-10.png">
        </button>
        <div class="taskbar-divider"></div>
        <div class="system-tray">
            <span id="clock">12:00 PM</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
