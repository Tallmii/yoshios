<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 10 Web Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Layer 1: BIOS -->
    <div id="bios-layer" class="screen-layer">
        <div class="bios-content">
            <p>American Megatrends (C) 2026</p>
            <p>CPU: AMD Ryzen 5 9600X @ 3.9GHz</p>
            <p>Speed: 4100MHz</p>
            <p>Memory Test: 32768MB OK</p>
            <p id="bios-status">Detecting storage devices...</p>
        </div>
    </div>

    <!-- Layer 2: Boot -->
    <div id="boot-layer" class="screen-layer hidden">
        <div class="boot-logo">
            <svg width="100" viewBox="0 0 24 24" fill="#0078d7">
                <path d="M0 3.449L9.75 2.1v9.451H0m10.5-9.599L24 0v11.55h-13.5M0 12.45h9.75v9.45L0 20.551m10.5-8.101H24V24l-13.5-1.95"/>
            </svg>
            <div class="win-spinner"></div>
        </div>
    </div>

    <!-- Layer 3: Desktop -->
    <div id="desktop-layer" class="screen-layer hidden">
        <div class="desktop-grid">
            <div class="desktop-item" data-app="pc">
                <img src="https://img.icons8.com/fluent/48/000000/monitor.png" alt="PC">
                <span>This PC</span>
            </div>
            <div class="desktop-item" data-app="browser">
                <img src="https://img.icons8.com/fluent/48/000000/edge.png" alt="Edge">
                <span>Edge</span>
            </div>
        </div>

        <!-- Window Template (Hidden by default) -->
        <div id="window-explorer" class="window hidden">
            <div class="window-header">
                <div class="header-left">
                    <img src="https://img.icons8.com/fluent/16/000000/monitor.png">
                    <span>This PC</span>
                </div>
                <div class="header-right">
                    <button class="win-btn min">−</button>
                    <button class="win-btn max">▢</button>
                    <button class="win-btn close" onclick="closeApp('window-explorer')">✕</button>
                </div>
            </div>
            <div class="window-body">
                <div class="explorer-content">
                    <div class="drive-icon">
                        <img src="https://img.icons8.com/fluent/48/000000/hard-drive.png">
                        <span>Local Disk (C:)</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Taskbar -->
        <div class="taskbar">
            <div class="start-trigger" id="start-btn">
                <img src="https://img.icons8.com/fluent/24/000000/windows-10.png">
            </div>
            <div class="taskbar-apps"></div>
            <div class="system-tray">
                <div id="clock-display"></div>
            </div>
        </div>

        <!-- Start Menu -->
        <div id="start-menu" class="hidden">
            <div class="start-sidebar">
                <img src="https://img.icons8.com/fluent/24/000000/user-male-circle.png">
                <img src="https://img.icons8.com/fluent/24/000000/settings.png">
                <img src="https://img.icons8.com/fluent/24/000000/shutdown.png">
            </div>
            <div class="start-apps">
                <p>Pinned Apps</p>
                <div class="tile-grid">
                    <div class="tile">Mail</div>
                    <div class="tile">Photos</div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
