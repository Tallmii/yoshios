<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Linux Simulation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="desktop-screen" class="fullscreen">
        <div class="top-panel">
            <div class="panel-left">
                <span class="activities">Activities</span>
                <span class="app-name">Terminal</span>
            </div>
            <div class="panel-center" id="clock">May 8 21:16</div>
            <div class="panel-right">
                <span>📶</span>
                <span>🔊</span>
                <span>🔋</span>
            </div>
        </div>

        <div class="desktop-area">
            <div class="icon" onclick="openTerminal()">
                <span class="icon-graphic">🐚</span>
                <p>Terminal</p>
            </div>
            <div class="icon">
                <span class="icon-graphic">📁</span>
                <p>Home</p>
            </div>
        </div>

        <div class="dock-container">
            <div class="dock">
                <div class="dock-item">🌐</div>
                <div class="dock-item">📂</div>
                <div class="dock-item active">🐚</div>
                <div class="dock-item">⚙️</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
