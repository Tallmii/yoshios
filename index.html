<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web OS Simulation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="desktop-screen" class="fullscreen">
        <div class="desktop-icons">
            <div class="icon">
                <span>🗑️</span>
                <p>Recycle Bin</p>
            </div>
            <div class="icon">
                <span>📁</span>
                <p>My PC</p>
            </div>
        </div>
        
        <div class="taskbar">
            <button id="start-button">⊞</button>
            <div class="time" id="clock">12:00 PM</div>
        </div>

        <div id="start-menu" class="hidden">
            <p>Start Menu Content Here</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
